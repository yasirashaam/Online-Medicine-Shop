{% extends 'base.html' %}
{% block content %}

<h2>Your Orders</h2>

{% if orders %}
    {% for order in orders %}
        <div style="border:1px solid black; padding:10px; margin:10px;">
            <p><strong>Order ID:</strong><a href="{% url 'order_detail' order.id %}">{{ order.id }}</a></p>
            <p><strong>Date:</strong> {{ order.created_at }}</p>
            <p><strong>Status:</strong> {{ order.status }}</p>
            <p><strong>Total:</strong> Rs. {{ order.total_price }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>No orders yet.</p>
{% endif %}

{% endblock %}
